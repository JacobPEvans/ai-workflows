# Claude Code Review
#
# DEPRECATED 2026-04-04: Removed in favor of Gemini + Copilot PR reviews.
# This workflow is disabled. Callers will silently skip (all jobs gated with if: false).
# To fully remove: delete this file and all caller references.
#
# Reusable workflow: automatic PR review with inline comments + interactive mode.
# Posts inline resolvable comments via mcp__github_inline_comment.
#
# Skip review by adding label: 'ai:skip-review'
# Summon manually: @claude in a PR conversation comment

name: Claude Code Review

on:
  # DEPRECATED 2026-04-04: Removed in favor of Gemini + Copilot PR reviews.
  # This workflow is disabled. Callers will silently skip (all jobs gated with if: false).
  # To fully remove: delete this file and all caller references.
  workflow_call:
    inputs:
      dummy:
        type: string
        description: "This workflow is deprecated and will not run"

# Workflow-level permissions set the maximum for all jobs.
# permissions: {} silently skips all jobs in cross-repo calls.
permissions:
  actions: read
  contents: read
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: claude-review-${{ github.repository }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: false  # Never cancel — queue instead to avoid wasting AI tokens

jobs:
  check-daily-limit:
    if: false
    name: Check daily run limit
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout ai-workflows scripts
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: .github/scripts
          path: .ai-workflows

      - name: Check daily run limit
        id: check
        uses: actions/github-script@v9
        env:
          DAILY_RUN_LIMIT: ${{ inputs.daily_run_limit }}
          WORKFLOW_FILE: ${{ github.workflow_ref }}
        with:
          script: |
            const run = require('./.ai-workflows/.github/scripts/shared/check-daily-limit.js');
            await run({ github, context, core });

  review:
    if: false
    # Original conditions (preserved for reuse in future AI review workflows):
    #   needs.check-daily-limit.outputs.should_run == 'true' &&
    #   github.actor != 'renovate[bot]' &&
    #   github.actor != 'dependabot[bot]' &&
    #   github.actor != 'claude[bot]' &&
    #   github.event.pull_request != null &&
    #   !contains(github.event.pull_request.labels.*.name, 'ai:skip-review')
    name: Claude Code Review
    needs: check-daily-limit
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    timeout-minutes: 10
    env:
      ANTHROPIC_BASE_URL: ${{ vars.OPENROUTER_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout ai-workflows prompts
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: |
            .github/scripts
            .github/prompts
          path: .ai-workflows

      - name: Check review eligibility
        id: eligibility
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MAX_REVIEWS: ${{ inputs.max_reviews }}
        with:
          script: |
            const run = require('./.ai-workflows/.github/scripts/claude-review/check-eligibility.js');
            await run({ github, context, core });

      - name: Render prompt
        if: >-
          steps.eligibility.outputs.eligible == 'true' &&
          (
            github.event.pull_request.user.type != 'Bot' ||
            contains(inputs.allowed_bots, github.event.pull_request.user.login) ||
            contains(inputs.allowed_bots, '*')
          )
        id: prompt
        env:
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_PROMPT: ${{ inputs.review_prompt }}
        run: bash .ai-workflows/.github/scripts/render-prompt.sh .ai-workflows/.github/prompts/claude-review.md

      - name: Run Claude Code Review
        if: >-
          steps.eligibility.outputs.eligible == 'true' &&
          (
            github.event.pull_request.user.type != 'Bot' ||
            contains(inputs.allowed_bots, github.event.pull_request.user.login) ||
            contains(inputs.allowed_bots, '*')
          )
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          allowed_bots: "github-actions"
          track_progress: true
          prompt: ${{ steps.prompt.outputs.content }}
          claude_args: |
            --model ${{ inputs.model || vars.AI_MODEL_REVIEW || vars.AI_MODEL || 'openrouter/free' }} --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  interactive:
    if: false
    # Original conditions (preserved for reuse):
    #   github.event.comment != null &&
    #   contains(github.event.comment.body, '@claude')
    name: Claude Interactive
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    timeout-minutes: 10
    env:
      ANTHROPIC_BASE_URL: ${{ vars.OPENROUTER_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Claude Interactive
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          allowed_bots: "github-actions"
          claude_args: |
            --model ${{ vars.AI_MODEL_REVIEW || vars.AI_MODEL || 'openrouter/free' }} --allowedTools "Read,Glob,Grep,LS,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh issue comment:*)"
