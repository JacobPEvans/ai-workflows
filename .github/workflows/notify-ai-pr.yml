# AI PR Notification
#
# Reusable workflow: notifies #github-automation Slack channel when a Claude-authored PR opens.
# Filters to claude[bot] authored PRs only. Extracts provenance from PR body footer.

name: AI PR Notification

on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

permissions:
  pull-requests: read

jobs:
  notify:
    if: github.event.pull_request.user.login == 'claude[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Checkout ai-workflows scripts
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: .github/scripts
          path: .ai-workflows

      - name: Send Slack notification
        uses: actions/github-script@v8
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO_NAME: ${{ github.repository }}
        with:
          script: |
            const run = require('./.ai-workflows/.github/scripts/notification/send-slack-pr-notify.js');
            await run({ github, context, core });
