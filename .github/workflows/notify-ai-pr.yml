# AI PR Notification
#
# Reusable workflow: notifies #github-automation Slack channel when a bot-authored PR opens.
# Filters by bot_login input (default: claude[bot]). Posts via the official
# slackapi/slack-github-action@v2 with a Block Kit payload from .github/payloads/slack/.

name: AI PR Notification

on:
  workflow_call:
    inputs:
      bot_login:
        description: "Bot login to filter PRs for (e.g., claude[bot], copilot[bot])"
        type: string
        default: "claude[bot]"
    secrets:
      GH_SLACK_WEBHOOK_URL_GITHUB_AUTOMATION:
        required: true
  workflow_dispatch:
    inputs:
      bot_login:
        description: "Bot login to filter PRs for (e.g., claude[bot], copilot[bot])"
        type: string
        default: "claude[bot]"

permissions:
  pull-requests: read

jobs:
  notify:
    if: github.event.pull_request.user.login == inputs.bot_login
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Checkout ai-workflows payloads
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: .github/payloads
          path: .ai-workflows

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.GH_SLACK_WEBHOOK_URL_GITHUB_AUTOMATION }}
          webhook-type: incoming-webhook
          payload-file-path: .ai-workflows/.github/payloads/slack/ai-pr-opened.json
          payload-templated: true
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO_NAME: ${{ github.repository }}
