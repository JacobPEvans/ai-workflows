# Auto-triage new issues: categorize, deduplicate, label, and comment
name: "Issue Triage"

on:
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number to triage (dispatch pattern; 0 = from event payload)"
        type: string
        default: "0"
  workflow_dispatch:

# Workflow-level permissions set the maximum for all jobs.
# permissions: {} silently skips all jobs in cross-repo calls.
permissions:
  contents: read
  id-token: write
  issues: write

concurrency:
  group: issue-triage-${{ github.repository }}

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
    timeout-minutes: 5
    env:
      ANTHROPIC_BASE_URL: ${{ vars.OPENROUTER_BASE_URL || secrets.OPENROUTER_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout ai-workflows
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: |
            .github/prompts
            .github/scripts
          path: .ai-workflows

      - name: Render prompt
        id: prompt
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number || '0' }}
        run: bash .ai-workflows/.github/scripts/render-prompt.sh .ai-workflows/.github/prompts/issue-triage.md ISSUE_NUMBER

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          allowed_bots: "github-actions"
          prompt: ${{ steps.prompt.outputs.content }}
          claude_args: >-
            --allowedTools "Read,Glob,Grep,LS,Bash(gh issue:*),Bash(gh search:*)"
            --model ${{ vars.AI_MODEL_ISSUES || vars.AI_MODEL || 'openrouter/free' }}
