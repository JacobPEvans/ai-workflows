# Code Simplifier
#
# Nightly DRY enforcer. Finds duplication, dead code, and simplification opportunities.
# Creates focused PRs.
#
# This is a reusable workflow that can be called from other repositories.

name: Code Simplifier

on:
  workflow_call:
    inputs:
      daily_run_limit:
        description: "Max workflow runs per day (0 to disable)"
        type: string
        default: "5"
  workflow_dispatch:

# Workflow-level permissions set the maximum for all jobs.
# permissions: {} silently skips all jobs in cross-repo calls.
permissions:
  actions: read
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: code-simplifier-${{ github.repository }}
  cancel-in-progress: false

jobs:
  check-pr-ceiling:
    name: Check bot PR ceiling
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Checkout ai-workflows scripts
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: .github/scripts
          path: .ai-workflows

      - name: Check bot PR ceiling
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const run = require('./.ai-workflows/.github/scripts/shared/check-pr-ceiling.js');
            await run({ github, context, core });

  check-daily-limit:
    name: Check daily run limit
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout ai-workflows scripts
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: .github/scripts
          path: .ai-workflows

      - name: Check daily run limit
        id: check
        uses: actions/github-script@v8
        env:
          DAILY_RUN_LIMIT: ${{ inputs.daily_run_limit }}
          WORKFLOW_FILE: ${{ github.workflow_ref }}
        with:
          script: |
            const run = require('./.ai-workflows/.github/scripts/shared/check-daily-limit.js');
            await run({ github, context, core });

  simplify:
    needs: [check-pr-ceiling, check-daily-limit]
    if: needs.check-pr-ceiling.outputs.allowed == 'true' && needs.check-daily-limit.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout ai-workflows
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: |
            .github/prompts
            .github/scripts
          path: .ai-workflows

      - name: Render prompt
        id: prompt
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          TRIGGER_ACTOR: ${{ github.triggering_actor }}
        run: bash .ai-workflows/.github/scripts/render-prompt.sh .ai-workflows/.github/prompts/code-simplifier.md WORKFLOW_NAME RUN_ID RUN_URL EVENT_NAME TRIGGER_ACTOR

      - name: Execute Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ vars.OPENROUTER_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          allowed_bots: "github-actions"
          use_commit_signing: "true"
          prompt: ${{ steps.prompt.outputs.content }}
          claude_args: >-
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git status:*),Bash(git branch:*),Bash(gh pr:*),Bash(gh api:*)"
            --model ${{ vars.DEFAULT_MODEL_CODE_SIMPLIFIER || vars.DEFAULT_MODEL }}
