# CI Fail Slack Notification
#
# Reusable workflow: posts to #github-ci-failures when a workflow run fails.
# Called by consumer repos via a workflow_run trigger.
#
# All workflow_run context fields must be passed as inputs because the reusable
# sees workflow_call event, not the caller's workflow_run event.
#
# Posts via the official slackapi/slack-github-action@v2 with a Block Kit
# payload from .github/payloads/slack/.
#
# Required secret (pass via secrets: inherit):
#   GH_SLACK_WEBHOOK_URL_GITHUB_CI_FAILURES

name: CI Fail Slack Notification

on:
  workflow_call:
    inputs:
      workflow_name:
        type: string
        required: true
      run_url:
        type: string
        required: true
      run_id:
        type: string
        required: true
      head_sha:
        type: string
        required: true
      head_branch:
        type: string
        required: true
      repository:
        type: string
        required: true
      conclusion:
        type: string
        required: true
      event_name:
        type: string
        required: true
    secrets:
      GH_SLACK_WEBHOOK_URL_GITHUB_CI_FAILURES:
        required: true
  workflow_dispatch:
    inputs:
      workflow_name:
        type: string
        required: true
      run_url:
        type: string
        required: true
      run_id:
        type: string
        required: true
      head_sha:
        type: string
        required: true
      head_branch:
        type: string
        required: true
      repository:
        type: string
        required: true
      conclusion:
        type: string
        required: true
      event_name:
        type: string
        required: true

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ai-workflows payloads
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: .github/payloads
          path: .ai-workflows

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.GH_SLACK_WEBHOOK_URL_GITHUB_CI_FAILURES }}
          webhook-type: incoming-webhook
          payload-file-path: .ai-workflows/.github/payloads/slack/ci-fail.json
          payload-templated: true
        env:
          WORKFLOW_NAME: ${{ inputs.workflow_name }}
          RUN_URL:       ${{ inputs.run_url }}
          RUN_ID:        ${{ inputs.run_id }}
          HEAD_SHA:      ${{ inputs.head_sha }}
          HEAD_BRANCH:   ${{ inputs.head_branch }}
          REPO_NAME:     ${{ inputs.repository }}
          CONCLUSION:    ${{ inputs.conclusion }}
          EVENT_NAME:    ${{ inputs.event_name }}
