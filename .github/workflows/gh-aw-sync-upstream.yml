name: gh-aw sync upstream imports

# Weekly scheduled sync of upstream agentics imports.
#
# The thin .md wrappers in this repo reference upstream templates via
# `imports: githubnext/agentics/workflows/*.md@main`. Those imports are
# cached under .github/aw/imports/<sha>/ and referenced by the compiled
# .lock.yml files. Without periodic regeneration, the cached SHA drifts
# behind upstream main indefinitely.
#
# This workflow clears the import cache, recompiles, and opens a PR on
# drift. It is intentionally a traditional .yml workflow (not a gh-aw .md
# wrapper) because we are bootstrapping gh-aw — the sync job itself must
# not depend on the thing it is syncing.
#
# No untrusted event payload is interpolated into run steps; all dynamic
# values pass through env: or action inputs.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: gh-aw-sync-upstream
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: Recompile and open drift PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install gh-aw extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh extension install github/gh-aw

      - name: Clear import cache
        run: rm -rf .github/aw/imports

      - name: Recompile workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # --action-tag forces release mode and pins the external
        # github/gh-aw/actions/setup reference to a specific gh-aw
        # release. Without this, the default dev mode emits
        # `uses: ./actions/setup` (a local path that does not exist
        # in this repo) and workflows fail at runtime in the
        # activation job.
        #
        # Keep this pinned to an actual gh-aw release tag. Renovate
        # tracks github/gh-aw releases via the github-releases
        # datasource so this should bump automatically.
        run: gh aw compile --action-tag v0.68.1

      - name: Open PR on drift
        uses: peter-evans/create-pull-request@v8
        with:
          branch: gh-aw/sync-upstream
          delete-branch: true
          sign-commits: true
          commit-message: "build(gh-aw): sync upstream agentics imports"
          title: "build(gh-aw): sync upstream agentics imports"
          body: |
            Automated sync of githubnext/agentics imports via gh aw compile
            with cleared import cache.

            The .github/aw/imports/<sha>/ cache has been rebuilt against the
            current upstream HEAD. Review the regenerated cache files and
            .lock.yml outputs before merging.

            Triggered by: .github/workflows/gh-aw-sync-upstream.yml
          labels: automated,gh-aw
          add-paths: |
            .github/aw/**
            .github/workflows/*.lock.yml
