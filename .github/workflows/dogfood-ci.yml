    with:
      repo_context: "Reusable GitHub Actions workflows for AI-powered CI/CD automation (prompts, scripts, YAML workflows)"
      ci_structure: "test.yml (bun test for JavaScript scripts)"
      workflow_name: "Tests"
    secrets: inherit
