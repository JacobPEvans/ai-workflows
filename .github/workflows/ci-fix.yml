# CI Failure Auto-Fix
#
# Reusable workflow: called by consumer repos when CI fails on a PR branch.
# Analyzes failure logs and pushes fixes (max 2 attempts per PR).
#
# Security: The fix job includes a fork guard to prevent untrusted code checkout
# in the privileged workflow_run context (CodeQL actions/untrusted-checkout/high).

name: CI Fix (Claude)

on:
  workflow_call:
    inputs:
      daily_run_limit:
        description: "Max workflow runs per day (0 to disable)"
        type: string
        default: "5"
      repo_context:
        description: "Brief description of the repository"
        type: string
        required: true
      ci_structure:
        description: "Description of CI workflows and what they check"
        type: string
        required: true
      extra_tools:
        description: "Additional allowed tools beyond defaults (e.g., Bash(tofu:*))"
        type: string
        default: ""
  workflow_dispatch:

# Workflow-level permissions set the maximum for all jobs.
# permissions: {} silently skips all jobs in cross-repo calls.
permissions:
  actions: read
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: ci-fix-${{ github.repository }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false  # Never cancel — queue instead to avoid wasting AI tokens

jobs:
  should-fix:
    name: Check if fix needed
    if: >-
      github.actor != 'renovate[bot]' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: read
    outputs:
      pr_number: ${{ steps.find-pr.outputs.pr_number }}
      should_run: ${{ steps.check-attempts.outputs.should_run }}
      attempt: ${{ steps.check-attempts.outputs.attempt }}
    steps:
      - name: Checkout ai-workflows scripts
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: .github/scripts
          path: .ai-workflows

      - name: Find associated PR
        id: find-pr
        uses: actions/github-script@v8
        with:
          script: |
            const run = require('./.ai-workflows/.github/scripts/ci-fix/find-pr.js');
            await run({ github, context, core });

      - name: Check attempt count
        id: check-attempts
        if: steps.find-pr.outputs.pr_number != ''
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
        with:
          script: |
            const run = require('./.ai-workflows/.github/scripts/ci-fix/check-attempts.js');
            await run({ github, context, core });

  check-daily-limit:
    name: Check daily run limit
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout ai-workflows scripts
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: .github/scripts
          path: .ai-workflows

      - name: Check daily run limit
        id: check
        uses: actions/github-script@v8
        env:
          DAILY_RUN_LIMIT: ${{ inputs.daily_run_limit }}
          WORKFLOW_FILE: ${{ github.workflow_ref }}
        with:
          script: |
            const run = require('./.ai-workflows/.github/scripts/shared/check-daily-limit.js');
            await run({ github, context, core });

  post-attempt-comment:
    name: Post attempt marker
    needs: [should-fix, check-daily-limit]
    if: >-
      github.event.workflow_run.head_repository.full_name == github.repository &&
      needs.should-fix.outputs.should_run == 'true' &&
      needs.check-daily-limit.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Checkout ai-workflows scripts
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: .github/scripts
          path: .ai-workflows

      - name: Post tracking comment
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ needs.should-fix.outputs.pr_number }}
          ATTEMPT: ${{ needs.should-fix.outputs.attempt }}
        with:
          script: |
            const run = require('./.ai-workflows/.github/scripts/ci-fix/post-attempt-comment.js');
            await run({ github, context, core });

  get-failure-details:
    name: Get failure logs
    needs: [should-fix, check-daily-limit]
    if: >-
      github.event.workflow_run.head_repository.full_name == github.repository &&
      needs.should-fix.outputs.should_run == 'true' &&
      needs.check-daily-limit.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      failure_logs: ${{ steps.get-logs.outputs.logs }}
    steps:
      - name: Checkout ai-workflows scripts
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: .github/scripts
          path: .ai-workflows

      - name: Download failure logs
        id: get-logs
        uses: actions/github-script@v8
        with:
          script: |
            const run = require('./.ai-workflows/.github/scripts/ci-fix/get-failure-logs.js');
            await run({ github, context, core });

  fix:
    name: Claude Fix
    needs: [should-fix, get-failure-details, post-attempt-comment, check-daily-limit]
    # Security: fork guard — only checkout branches from the same repository, never forks
    # Also require upstream gate jobs to have passed (explicit `if` replaces the default
    # dependency-success check, so all conditions must be listed here).
    if: >-
      github.event.workflow_run.head_repository.full_name == github.repository &&
      needs.should-fix.outputs.should_run == 'true' &&
      needs.check-daily-limit.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    timeout-minutes: 15
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Checkout ai-workflows prompts
        uses: actions/checkout@v6
        with:
          repository: JacobPEvans/ai-workflows
          sparse-checkout: |
            .github/scripts
            .github/prompts
          path: .ai-workflows

      - name: Render prompt
        id: prompt
        env:
          REPO_CONTEXT: ${{ inputs.repo_context }}
          CI_STRUCTURE: ${{ inputs.ci_structure }}
          FAILURE_LOGS: ${{ needs.get-failure-details.outputs.failure_logs }}
          ATTEMPT_NUM: ${{ needs.should-fix.outputs.attempt }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          TRIGGER_ACTOR: ${{ github.triggering_actor }}
        run: bash .ai-workflows/.github/scripts/render-prompt.sh .ai-workflows/.github/prompts/ci-fix.md FAILURE_LOGS REPO_CONTEXT CI_STRUCTURE ATTEMPT_NUM WORKFLOW_NAME RUN_ID RUN_URL EVENT_NAME TRIGGER_ACTOR

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ vars.OPENROUTER_BASE_URL }}
        with:
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          allowed_bots: "github-actions,claude"
          use_commit_signing: "true"
          prompt: ${{ steps.prompt.outputs.content }}
          claude_args: >-
            --model ${{ vars.DEFAULT_MODEL_CI_FIX || vars.DEFAULT_MODEL }}
            --allowedTools "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git log:*),Bash(git diff:*),Bash(git show:*),Bash(git status:*),Bash(git branch:*)${{ inputs.extra_tools != '' && format(',{0}', inputs.extra_tools) || '' }}"

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ needs.should-fix.outputs.pr_number }};
            if (!prNumber) return;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `> **CI fix failed.** Workflow timed out or encountered an error.\n> [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n> This PR may need manual CI fixes.`
            });
